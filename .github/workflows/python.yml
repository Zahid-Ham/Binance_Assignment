name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint and Format check with Ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check . --select=E9,F63,F7,F82 --show-source
          # exit-zero treats all errors as warnings.
          ruff check . --exit-zero --statistics

      - name: Run Pytest suite
        env:
          BINANCE_API_KEY: "ci_dummy_key_for_testing_purposes_only_12345"
          BINANCE_SECRET_KEY: "ci_dummy_secret_for_testing_purposes_only_12345"
        run: |
          python -m pytest tests/
